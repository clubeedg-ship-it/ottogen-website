<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    margin: 0;
    width: 1200px;
    height: 630px;
    background: #050510;
    color: #f0f0f5;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 120%, rgba(0,85,255,0.15) 0%, transparent 60%);
  }
  .logo {
    z-index: 1;
    width: 500px;
    height: auto;
    margin-bottom: 40px;
  }
  h1 {
    z-index: 1;
    font-size: 56px;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, #fff 0%, #0055ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  p {
    z-index: 1;
    font-size: 28px;
    color: #9898b0;
    margin-top: 16px;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <img src="oopuo-logo-white.svg" class="logo">
  <h1>Your outsourced digital & AI team.</h1>
  <p>Website • Hosting • Email • AI • Support</p>
</body>
</html>
